<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:
opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
</head>

<body class="student-body">
    <div class="head">
        <h1>Student Dashboard</h1>
    </div>

    <div class="notice-form-card2">
         <input type="text" id="search" placeholder="Search notices" class="in">
    <button onclick="searchNotice()" class="btn">
        <span class="material-symbols-outlined">
    search
    </span>
    </button>
        <div class="form-group">
         <label>Category:</label>
        <select id="student-category" class="in">
        <option value="" disabled selected>Select Category</option>
        <option value="All">All</option>
        <option value="Academic">Academic</option>
        <option value="Placement">Placement</option>
        <option value="Events">Events</option>
        <option value="Fees">Fees</option>
        <option value="Circulars">Circulars</option>
    </select></div>

    <div class="form-group">
        <button onclick="filterCategory()" class="btn"> Subscribe </button>
    </div>
    <div class="form-group">
            <label>Select Department:</label>
        <select id="student-dept" class="in">
        <option value="" disabled selected>Select Departement</option>
        <option value="All">All</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
        <option value="IT">IT</option>
    </select>
    <button onclick="filterNotices()" class="btn"> Filter</button>
    </div>
    </div>
    <div id="student-container"></div>
<script src="student-dashboard.js"></script>
</body>
</html>
