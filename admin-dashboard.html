<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <div class="head">
            <h1>Admin Dashboard</h1>
        </div>
        <br>
        <div class="notice-form-card">
            <form id="notice-form">
                <div class="form-group">
                    <label for="category">Category : </label>
                    <select id="category">
                        <option value="" disabled selected>Select Category</option>
                        <option value="Academic">Academic Updates</option>
                        <option value="Placement">Placement Cell</option>
                        <option value="Events">Events</option>
                        <option value="Fees">Fees</option>
                        <option value="Circulars">Circulars</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department : </label>
                    <select id="department">
                        <option value="" disabled selected>Select Departement</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="CSD">CSD</option>
                        <option value="CSM">CSM</option>
                        <option value="IT">IT</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message : </label>
                    <textarea id="message" placeholder="Enter notice message" required></textarea>
                </div>

                <div class="form-group">
                    <label>Expiry Date : </label>
                    <input type="date" id="expiry" required>
                </div>

                <div class="form-group">
                    <label>Attachment : </label>
                    <input type="file" id="attachment">
                </div>
                <button type="submit" class="btn">
                    Post Notice
                </button>
            </form>
        </div>
        <div class="notice-section">
            <h2>Active Notices : </h2>
            <div id="notice-container"></div>
        </div>

        <div class="notice-section">
            <h2>Archived Notices : </h2>
            <div id="archive-container"></div>
        </div>
    </div>
    <script src="admin-dashboard.js"></script>
</body>
</html>
