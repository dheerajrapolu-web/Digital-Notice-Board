<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Login page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="Landing">
    <div class="container">

        <div class="Heading">
            <h1>Admin Login</h1>
        </div>

        <div class="forms" id="admin-form">
            <form>
               <div class="inputs">
                <label for="admin-uname">Username :</label>  
                <input type="text" placeholder="Username" id="admin-uname" >
               </div>

               <div class="inputs">
                <label for="admin-pass">Password : </label>
                <input type="password" placeholder="Password" id="admin-pass">
                </div>
                
                <button type="submit" class="b1 login">Login</button>
           </form>
        </div>
    </div>
   <script>
let form = document.getElementById("admin-form");

form.addEventListener("submit", function(event) {
    event.preventDefault();

    let username = document.getElementById("admin-uname").value;
    let password = document.getElementById("admin-pass").value;

    if (username === "admin" && password === "1234") {
        alert("Login successful");
        window.location.href = "admin-dashboard.html";
    } else {
        alert("Invalid username or password");
    }
});
</script>
</body>
</html>
